name: Diting CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # 允许手动触发

env:
  PYTHON_VERSION: "3.11"
  COVERAGE_THRESHOLD: 75

jobs:
  # ============================================
  # 1. 代码质量检查
  # ============================================
  lint:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy types-requests
    
    - name: Check code style (flake8)
      run: |
        flake8 diting/ --max-line-length=100 --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 diting/ --max-line-length=100 --count --exit-zero
    
    - name: Check formatting (black)
      run: |
        black --check diting/ --line-length 100 || true
    
    - name: Check imports (isort)
      run: |
        isort --check-only diting/ --profile black --line-length 100 || true
    
    - name: Type checking (mypy)
      run: |
        mypy diting/ --ignore-missing-imports || true

  # ============================================
  # 2. 单元测试
  # ============================================
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio pytest-mock
    
    - name: Run tests with coverage
      run: |
        pytest tests/ -v \
          --cov=diting \
          --cov-report=xml \
          --cov-report=term-missing \
          --cov-report=html \
          --tb=short \
          --maxfail=5
    
    - name: Check coverage threshold
      run: |
        pytest --cov=diting --cov-fail-under=${{ env.COVERAGE_THRESHOLD }}
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        fail_ci_if_error: false
    
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report-py${{ matrix.python-version }}
        path: htmlcov/
        retention-days: 7

  # ============================================
  # 3. 集成测试
  # ============================================
  integration:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio
    
    - name: Run integration tests
      run: |
        pytest tests/test_mcp_integration.py tests/test_e2e.py -v --tb=short
    
    - name: Run MCP server tests
      run: |
        pytest tests/test_mcp_server.py tests/test_mcp_async.py -v --tb=short

  # ============================================
  # 4. 安全扫描
  # ============================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install safety
      run: |
        pip install safety
    
    - name: Check dependencies for vulnerabilities
      run: |
        safety check --json > safety-report.json || true
    
    - name: Upload security report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-report
        path: safety-report.json
        retention-days: 30

  # ============================================
  # 5. 构建验证
  # ============================================
  build:
    name: 📦 Build Validation
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install build tools
      run: |
        pip install build twine
    
    - name: Build package
      run: |
        python -m build
    
    - name: Check package metadata
      run: |
        twine check dist/*
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
        retention-days: 7

  # ============================================
  # 6. 文档检查
  # ============================================
  docs:
    name: 📚 Documentation
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check markdown files
      run: |
        # 检查主要文档是否存在
        test -f README.md && echo "✅ README.md exists"
        test -f DITING_SKILL.md && echo "✅ DITING_SKILL.md exists"
        test -f DITING_USAGE.md && echo "✅ DITING_USAGE.md exists"
    
    - name: Check for broken links (basic)
      run: |
        # 简单检查 markdown 文件中的明显错误
        grep -r "http://" *.md || true
        echo "✅ Documentation check passed"

  # ============================================
  # 7. 测试报告汇总
  # ============================================
  report:
    name: 📊 Test Report
    runs-on: ubuntu-latest
    needs: [test, integration, lint, security, build, docs]
    if: always()
    
    steps:
    - name: Generate test summary
      run: |
        echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Test (3.11) | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Test (3.12) | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Integration | ${{ needs.integration.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Docs | ${{ needs.docs.result }} |" >> $GITHUB_STEP_SUMMARY
